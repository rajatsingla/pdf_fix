<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Fix</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #1a1e26;
        --fg: #e7e9ee;
        --muted: #9aa3b2;
        --accent: #4f8cff;
        --ok: #36c08a;
        --err: #ff6b6b;
        --border: #2a2f3a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          15px/1.5 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: min(480px, 92vw);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      p.sub {
        margin: 0 0 22px;
        color: var(--muted);
      }
      .modes {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }
      .mode {
        flex: 1;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        user-select: none;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #141821;
        color: var(--fg);
        font-weight: 600;
        transition: 0.15s;
      }
      .mode:hover {
        border-color: var(--accent);
      }
      .mode.active {
        border-color: var(--accent);
        background: rgba(79, 140, 255, 0.14);
        color: #cfe0ff;
      }
      .dims {
        display: none;
        gap: 10px;
        margin-bottom: 16px;
      }
      .dims.show {
        display: flex;
      }
      .dims label {
        flex: 1;
        font-size: 13px;
        color: var(--muted);
      }
      .dims input {
        width: 100%;
        margin-top: 4px;
        padding: 9px 10px;
        border-radius: 8px;
        background: #0e1117;
        border: 1px solid var(--border);
        color: var(--fg);
      }
      .cover-opts {
        display: none;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 16px;
      }
      .cover-opts.show {
        display: flex;
      }
      .cover-opts .dims {
        margin-bottom: 0;
      }
      .submodes {
        display: flex;
        gap: 8px;
      }
      .submode {
        flex: 1;
        padding: 8px;
        text-align: center;
        cursor: pointer;
        user-select: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #141821;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        transition: 0.15s;
      }
      .submode:hover {
        border-color: var(--accent);
      }
      .submode.active {
        border-color: var(--accent);
        background: rgba(79, 140, 255, 0.14);
        color: #cfe0ff;
      }
      .calc {
        font-size: 13px;
        color: var(--muted);
        min-height: 18px;
      }
      .calc b {
        color: var(--fg);
      }
      .drop {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 104px;
        border: 1.5px dashed var(--border);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        color: var(--muted);
        cursor: pointer;
        margin-bottom: 18px;
        background: #11151d;
        transition: 0.15s;
      }
      .drop:hover {
        border-color: var(--accent);
        color: var(--fg);
      }
      .drop.has {
        border-color: var(--ok);
        color: var(--fg);
        background: rgba(54, 192, 138, 0.07);
      }
      .drop .ic {
        font-size: 24px;
        line-height: 1;
        opacity: 0.85;
      }
      .drop .main {
        font-weight: 600;
        word-break: break-all;
      }
      .drop .hint {
        font-size: 12px;
        color: var(--muted);
      }
      button.go {
        width: 100%;
        padding: 13px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        transition: 0.15s;
      }
      button.go:not(:disabled):hover {
        background: #3f7cf0;
      }
      button.go:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .bar {
        height: 8px;
        background: #0e1117;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 16px;
        display: none;
      }
      .bar.show {
        display: block;
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 0;
        background: var(--accent);
        transition: width 0.2s;
      }
      .bar.indet > i {
        width: 35% !important;
        animation: slide 1s infinite ease-in-out;
      }
      @keyframes slide {
        0% {
          margin-left: -35%;
        }
        100% {
          margin-left: 100%;
        }
      }
      .status {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
        min-height: 18px;
      }
      .status.err {
        color: var(--err);
      }
      .status.ok {
        color: var(--ok);
      }
      a.dl {
        display: none;
        margin-top: 16px;
        text-align: center;
        padding: 12px;
        border-radius: 10px;
        background: var(--ok);
        color: #06241a;
        font-weight: 700;
        text-decoration: none;
      }
      a.dl.show {
        display: block;
      }
      input[type="file"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Fix Book PDF</h1>
      <p class="sub">Pick a mode, upload a PDF, download the fixed file.</p>

      <div class="modes">
        <div class="mode" data-mode="cover">Fix Cover</div>
        <div class="mode" data-mode="interior">Fix Interior</div>
      </div>

      <div class="cover-opts" id="coverOpts">
        <div class="submodes">
          <div class="submode active" data-sub="direct">Final cover size</div>
          <div class="submode" data-sub="interior">From interior file</div>
        </div>

        <div class="dims show" id="directDims">
          <label
            >Width (in)
            <input id="width" type="number" step="0.01" min="0.1" value="5.5" />
          </label>
          <label
            >Height (in)
            <input id="height" type="number" step="0.01" min="0.1" value="8.5" />
          </label>
        </div>

        <div class="dims" id="interiorDims">
          <label
            >Interior width (in)
            <input id="trimW" type="number" step="0.01" min="0.1" value="5.5" />
          </label>
          <label
            >Interior height (in)
            <input id="trimH" type="number" step="0.01" min="0.1" value="8.5" />
          </label>
          <label
            >Page count
            <input id="pageCount" type="number" step="1" min="1" value="30" />
          </label>
        </div>

        <div class="calc" id="calc"></div>
      </div>

      <label class="drop" id="drop">
        <span class="ic">📄</span>
        <span class="main" id="dropText">Click to choose a PDF</span>
        <span class="hint" id="dropHint">PDF only</span>
        <input id="file" type="file" accept="application/pdf,.pdf" />
      </label>

      <button class="go" id="go" disabled>Process</button>

      <div class="bar" id="bar"><i id="barFill"></i></div>
      <div class="status" id="status"></div>
      <a class="dl" id="dl">Download fixed PDF</a>
    </div>

    <script>
      // Base URL of the FastAPI service.
      // ""  -> same origin (works when this page is served by the API itself).
      // Otherwise set the full URL, e.g. "https://pdf.example.com".
      // Note: if this page is served over HTTPS, API_BASE must also be HTTPS
      // (browsers block HTTPS pages calling http:// endpoints).
      const API_BASE = "https://pdf-fix.stck.dev";

      const el = (id) => document.getElementById(id);
      const coverOpts = el("coverOpts"),
        directDims = el("directDims"),
        interiorDims = el("interiorDims"),
        calc = el("calc");
      const dropText = el("dropText"),
        drop = el("drop");
      const fileInput = el("file"),
        go = el("go"),
        bar = el("bar"),
        barFill = el("barFill");
      const status = el("status"),
        dl = el("dl"),
        dropHint = el("dropHint");

      let mode = null;
      let coverSub = "direct"; // "direct" | "interior"
      let file = null;
      let lastUrl = null;

      function refresh() {
        go.disabled = !(mode && file);
      }

      // Compute the final cover PDF dimensions from the interior trim size and
      // page count. Mirrors the logic in tango's src/utils/book/index.ts:
      //   spineWidth  = pageCount / 444 + 0.06
      //   coverWidth  = trimWidth * 2 + spineWidth + 0.25
      //   coverHeight = trimHeight + 0.25
      function coverFromInterior() {
        const trimW = parseFloat(el("trimW").value);
        const trimH = parseFloat(el("trimH").value);
        const pages = parseInt(el("pageCount").value, 10);
        if (!(trimW > 0) || !(trimH > 0) || !(pages > 0)) return null;
        const spine = pages / 444 + 0.06;
        return {
          width: trimW * 2 + spine + 0.25,
          height: trimH + 0.25,
          spine,
        };
      }

      function updateCalc() {
        if (coverSub !== "interior") {
          calc.textContent = "";
          return;
        }
        const d = coverFromInterior();
        calc.innerHTML = d
          ? `Cover PDF: <b>${d.width.toFixed(3)}in × ${d.height.toFixed(3)}in</b> ` +
            `(spine ${d.spine.toFixed(3)}in)`
          : "Enter valid interior size and page count.";
      }

      // Resolve the final cover width/height to send to the API.
      function coverDims() {
        if (coverSub === "interior") {
          const d = coverFromInterior();
          return d ? { width: d.width, height: d.height } : null;
        }
        const w = parseFloat(el("width").value),
          h = parseFloat(el("height").value);
        return w > 0 && h > 0 ? { width: w, height: h } : null;
      }

      document.querySelectorAll(".mode").forEach((m) => {
        m.addEventListener("click", () => {
          document
            .querySelectorAll(".mode")
            .forEach((x) => x.classList.remove("active"));
          m.classList.add("active");
          mode = m.dataset.mode;
          coverOpts.classList.toggle("show", mode === "cover");
          refresh();
        });
      });

      document.querySelectorAll(".submode").forEach((s) => {
        s.addEventListener("click", () => {
          document
            .querySelectorAll(".submode")
            .forEach((x) => x.classList.remove("active"));
          s.classList.add("active");
          coverSub = s.dataset.sub;
          directDims.classList.toggle("show", coverSub === "direct");
          interiorDims.classList.toggle("show", coverSub === "interior");
          updateCalc();
        });
      });

      ["trimW", "trimH", "pageCount"].forEach((id) =>
        el(id).addEventListener("input", updateCalc),
      );

      fileInput.addEventListener("change", () => {
        file = fileInput.files[0] || null;
        drop.classList.toggle("has", !!file);
        dropText.textContent = file ? file.name : "Click to choose a PDF";
        dropHint.textContent = file
          ? (file.size / (1024 * 1024)).toFixed(1) + " MB"
          : "PDF only";
        refresh();
      });

      function setStatus(msg, kind) {
        status.textContent = msg;
        status.className = "status" + (kind ? " " + kind : "");
      }

      function resetOutput() {
        dl.classList.remove("show");
        if (lastUrl) {
          URL.revokeObjectURL(lastUrl);
          lastUrl = null;
        }
      }

      go.addEventListener("click", () => {
        if (!mode || !file) return;
        resetOutput();

        let url;
        if (mode === "cover") {
          const d = coverDims();
          if (!d) {
            setStatus(
              coverSub === "interior"
                ? "Enter valid interior size and page count."
                : "Enter valid width and height.",
              "err",
            );
            return;
          }
          url =
            `${API_BASE}/fix-cover?width_in=${encodeURIComponent(d.width)}` +
            `&height_in=${encodeURIComponent(d.height)}`;
        } else {
          url = `${API_BASE}/fix-interior`;
        }

        go.disabled = true;
        bar.classList.add("show");
        bar.classList.remove("indet");
        barFill.style.width = "0";
        setStatus("Uploading…");

        const xhr = new XMLHttpRequest();
        xhr.open("POST", url);
        xhr.setRequestHeader("Content-Type", "application/pdf");
        xhr.responseType = "blob";

        // Approximate progress: real % for upload, indeterminate while processing.
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            barFill.style.width = Math.round((e.loaded / e.total) * 100) + "%";
          }
        };
        xhr.upload.onload = () => {
          bar.classList.add("indet");
          setStatus("Processing…");
        };

        xhr.onload = () => {
          bar.classList.remove("indet");
          go.disabled = false;
          if (xhr.status === 200) {
            barFill.style.width = "100%";
            lastUrl = URL.createObjectURL(xhr.response);
            dl.href = lastUrl;
            const base = file.name.replace(/\.pdf$/i, "");
            dl.download = `${base}-fixed.pdf`;
            dl.classList.add("show");
            setStatus("Done.", "ok");
          } else {
            bar.classList.remove("show");
            // FastAPI error body is JSON: {"detail": "..."}.
            xhr.response.text().then((t) => {
              let msg = t;
              try {
                msg = JSON.parse(t).detail || t;
              } catch (_) {}
              setStatus("Error: " + msg, "err");
            });
          }
        };

        xhr.onerror = () => {
          bar.classList.remove("show", "indet");
          go.disabled = false;
          setStatus(
            "Network error — check the API URL / CORS / that the service is running.",
            "err",
          );
        };

        xhr.send(file);
      });
    </script>
  </body>
</html>
